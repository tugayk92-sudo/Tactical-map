<script>
// ============================================================
// APP STATE
// ============================================================
let map, userMarker, accuracyCircle, userLat = null, userLng = null, userAlt = null;
let currentMode = 'VIEW';
let measurePoints = [], measureMarkers = [], measureLine = null;
let azimuthMarker = null, azimuthLine = null;
let waypoints = [];
let pendingWpLat = null, pendingWpLng = null;
let coordMode = 'DMS';
let gpsFollow = false;
let wpCounter = 1;

// ============================================================
// MAP INIT
// ============================================================
function initMap() {
  map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    center: [39.0, 35.0],
    zoom: 6
  });

  // OSM tile layer - cached by service worker
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    minZoom: 3,
    subdomains: 'abc',
    attribution: '© OSM',
    crossOrigin: true
  }).addTo(map);

  // Zoom control top-right
  L.control.zoom({ position: 'topright' }).addTo(map);

  // Attribution small
  L.control.attribution({ position: 'bottomleft', prefix: false }).addTo(map);

  // Map click handler
  map.on('click', onMapClick);
}

// ============================================================
// GPS
// ============================================================
function initGPS() {
  if (!navigator.geolocation) {
    updateGpsStatus('GPS YOK', false);
    return;
  }
  navigator.geolocation.watchPosition(onGpsUpdate, onGpsError, {
    enableHighAccuracy: true,
    maximumAge: 2000,
    timeout: 10000
  });
}

function onGpsUpdate(pos) {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  userAlt = pos.coords.altitude;
  const acc = Math.round(pos.coords.accuracy);

  updateGpsStatus(`±${acc}m`, true);
  updateCoordDisplay(userLat, userLng, userAlt);

  const latlng = [userLat, userLng];

  if (!userMarker) {
    userMarker = L.circleMarker(latlng, {
      radius: 8, color: '#22c55e', fillColor: '#22c55e',
      fillOpacity: 1, weight: 2
    }).addTo(map).bindPopup('<b style="color:#f59e0b">SEN BURADASIN</b>');

    accuracyCircle = L.circle(latlng, {
      radius: acc, color: '#22c55e', fillColor: '#22c55e',
      fillOpacity: 0.08, weight: 1, dashArray: '4'
    }).addTo(map);

    // First fix → center map
    map.setView(latlng, 13);
  } else {
    userMarker.setLatLng(latlng);
    accuracyCircle.setLatLng(latlng).setRadius(acc);
  }

  if (gpsFollow) {
    map.setView(latlng);
  }
}

function onGpsError(err) {
  updateGpsStatus('GPS HATA', false);
}

function updateGpsStatus(text, active) {
  document.getElementById('gps-dot').className = 'gps-dot' + (active ? ' active' : '');
  document.getElementById('gps-acc-text').textContent = `GPS: ${text}`;
}

// ============================================================
// COORDINATE DISPLAY
// ============================================================
function setCoordMode(mode) {
  coordMode = mode;
  ['DMS','DD','UTM'].forEach(m => {
    document.getElementById('btn-' + m.toLowerCase()).classList.toggle('active', m === mode);
  });
  if (userLat !== null) updateCoordDisplay(userLat, userLng, userAlt);
}

function updateCoordDisplay(lat, lng, alt) {
  let latStr, lonStr;
  if (coordMode === 'DMS') {
    latStr = toDMS(lat, 'lat');
    lonStr = toDMS(lng, 'lon');
  } else if (coordMode === 'DD') {
    latStr = lat.toFixed(6) + '°';
    lonStr = lng.toFixed(6) + '°';
  } else {
    const utm = latLngToUTM(lat, lng);
    latStr = utm.zone + utm.hemisphere;
    lonStr = utm.easting + ' ' + utm.northing;
  }

  document.getElementById('coord-lat').textContent = latStr;
  document.getElementById('coord-lon').textContent = lonStr;
  document.getElementById('coord-utm').textContent = latLngToUTM(lat, lng).string;
  document.getElementById('coord-alt').textContent = alt !== null ? `ALT: ${Math.round(alt)}m` : 'ALT: ---m';
}

function toDMS(deg, type) {
  const d = Math.abs(deg);
  const dd = Math.floor(d);
  const mm = Math.floor((d - dd) * 60);
  const ss = ((d - dd - mm/60) * 3600).toFixed(1);
  const dir = type === 'lat' ? (deg >= 0 ? 'K' : 'G') : (deg >= 0 ? 'D' : 'B');
  return `${dd}° ${mm}' ${ss}" ${dir}`;
}

// ============================================================
// UTM CONVERSION
// ============================================================
function latLngToUTM(lat, lng) {
  const a = 6378137.0;
  const f = 1 / 298.257223563;
  const b = a * (1 - f);
  const e2 = 1 - (b * b) / (a * a);
  const ePrime2 = e2 / (1 - e2);
  const k0 = 0.9996;

  const zone = Math.floor((lng + 180) / 6) + 1;
  const lambda0 = ((zone - 1) * 6 - 180 + 3) * Math.PI / 180;
  const phi = lat * Math.PI / 180;
  const lambda = lng * Math.PI / 180;

  const N = a / Math.sqrt(1 - e2 * Math.sin(phi) ** 2);
  const T = Math.tan(phi) ** 2;
  const C = ePrime2 * Math.cos(phi) ** 2;
  const A = Math.cos(phi) * (lambda - lambda0);

  const M = a * (
    (1 - e2 / 4 - 3 * e2 ** 2 / 64 - 5 * e2 ** 3 / 256) * phi
    - (3 * e2 / 8 + 3 * e2 ** 2 / 32 + 45 * e2 ** 3 / 1024) * Math.sin(2 * phi)
    + (15 * e2 ** 2 / 256 + 45 * e2 ** 3 / 1024) * Math.sin(4 * phi)
    - (35 * e2 ** 3 / 3072) * Math.sin(6 * phi)
  );

  const easting = k0 * N * (
    A + (1 - T + C) * A ** 3 / 6
    + (5 - 18 * T + T ** 2 + 72 * C - 58 * ePrime2) * A ** 5 / 120
  ) + 500000;

  let northing = k0 * (
    M + N * Math.tan(phi) * (
      A ** 2 / 2
      + (5 - T + 9 * C + 4 * C ** 2) * A ** 4 / 24
      + (61 - 58 * T + T ** 2 + 600 * C - 330 * ePrime2) * A ** 6 / 720
    )
  );
  if (lat < 0) northing += 10000000;

  const hemi = lat >= 0 ? 'N' : 'S';
  const E = Math.round(easting).toString().padStart(7, '0');
  const Ns = Math.round(northing).toString().padStart(8, '0');

  return {
    zone, hemisphere: hemi,
    easting: Math.round(easting),
    northing: Math.round(northing),
    string: `${zone}${hemi} ${E} ${Ns}`
  };
}

// ============================================================
// DISTANCE & BEARING
// ============================================================
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function bearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const phi1 = lat1 * Math.PI / 180;
  const phi2 = lat2 * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(phi2);
  const x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(dLon);
  return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

function formatDistance(m) {
  if (m >= 1000) return (m / 1000).toFixed(2) + ' km';
  return Math.round(m) + ' m';
}

function bearingToDirection(deg) {
  const dirs = ['K', 'KKD', 'KD', 'DKD', 'D', 'DGD', 'GD', 'GGD', 'G', 'GGB', 'GB', 'BGB', 'B', 'BKB', 'KB', 'KKB'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// ============================================================
// MODE MANAGEMENT
// ============================================================
function setMode(mode) {
  // Clear previous state
  if (currentMode === 'MEASURE') clearMeasure();
  if (currentMode === 'AZIMUTH') clearAzimuth();
  if (mode !== 'GPS') gpsFollow = false;

  currentMode = mode;

  // Update toolbar buttons
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));

  const modeMap = {
    'VIEW': 'btn-view', 'GPS': 'btn-gps',
    'WAYPOINT': 'btn-wp', 'MEASURE': 'btn-measure',
    'AZIMUTH': 'btn-azimuth'
  };
  if (modeMap[mode]) document.getElementById(modeMap[mode]).classList.add('active');

  // Mode-specific setup
  const modeLabels = {
    VIEW: '🗺️  GÖRÜNTÜLEME MODU',
    GPS: '📡  GPS TAKİP AKTİF',
    WAYPOINT: '📌  HARİTAYA DOKUN → NOKTA EKLE',
    MEASURE: '📏  2 NOKTA SEÇ → MESAFE HESAPLA',
    AZIMUTH: '🧭  HEDEF SEÇ → AZİMUT HESAPLA'
  };
  showModeIndicator(modeLabels[mode] || mode);

  if (mode === 'GPS') {
    gpsFollow = true;
    if (userLat !== null) map.setView([userLat, userLng], 15);
  }

  map.getContainer().style.cursor = ['WAYPOINT', 'MEASURE', 'AZIMUTH'].includes(mode) ? 'crosshair' : '';
}

function showModeIndicator(text) {
  const el = document.getElementById('mode-indicator');
  el.textContent = text;
  el.classList.add('visible');
  clearTimeout(window._modeTimer);
  window._modeTimer = setTimeout(() => el.classList.remove('visible'), 3000);
}

// ============================================================
// MAP CLICK HANDLER
// ============================================================
function onMapClick(e) {
  const { lat, lng } = e.latlng;

  if (currentMode === 'WAYPOINT') {
    pendingWpLat = lat;
    pendingWpLng = lng;
    document.getElementById('wp-name-input').value = `NOKTA-${wpCounter}`;
    document.getElementById('wp-coord-preview').textContent =
      `${toDMS(lat, 'lat')}  ${toDMS(lng, 'lon')}\nUTM: ${latLngToUTM(lat, lng).string}`;
    document.getElementById('wp-modal').classList.remove('hidden');

  } else if (currentMode === 'MEASURE') {
    if (measurePoints.length >= 2) clearMeasure();
    measurePoints.push([lat, lng]);
    const dot = L.marker([lat, lng], {
      icon: L.divIcon({ className: '', html: '<div class="measure-dot"></div>', iconSize: [12, 12], iconAnchor: [6, 6] })
    }).addTo(map);
    measureMarkers.push(dot);

    if (measurePoints.length === 2) {
      const [p1, p2] = measurePoints;
      const dist = haversine(p1[0], p1[1], p2[0], p2[1]);
      const b1 = bearing(p1[0], p1[1], p2[0], p2[1]);
      const b2 = bearing(p2[0], p2[1], p1[0], p1[1]);

      measureLine = L.polyline(measurePoints, {
        color: '#ef4444', weight: 2, dashArray: '6,4'
      }).addTo(map);

      showResult('📏 MESAFE & AZİMUT', [
        ['MESAFE', formatDistance(dist), true],
        ['AZİMUT (1→2)', `${b1.toFixed(1)}° (${bearingToDirection(b1)})`, false],
        ['AZİMUT (2→1)', `${b2.toFixed(1)}° (${bearingToDirection(b2)})`, false],
        ['NOKTA 1', `${toDMS(p1[0],'lat')} ${toDMS(p1[1],'lon')}`, false],
        ['NOKTA 2', `${toDMS(p2[0],'lat')} ${toDMS(p2[1],'lon')}`, false],
      ]);
    }

  } else if (currentMode === 'AZIMUTH') {
    clearAzimuth();
    if (userLat === null) {
      showResult('🧭 AZİMUT', [['HATA', 'GPS sinyali bekleniyor...', true]]);
      return;
    }

    const dist = haversine(userLat, userLng, lat, lng);
    const b1 = bearing(userLat, userLng, lat, lng);

    azimuthMarker = L.marker([lat, lng], {
      icon: L.divIcon({
        className: '',
        html: `<div style="width:16px;height:16px;border:2px solid #f59e0b;border-radius:50%;background:rgba(245,158,11,0.3);box-shadow:0 0 8px #f59e0b;"></div>`,
        iconSize: [16, 16], iconAnchor: [8, 8]
      })
    }).addTo(map);

    azimuthLine = L.polyline([[userLat, userLng], [lat, lng]], {
      color: '#f59e0b', weight: 2, dashArray: '8,4'
    }).addTo(map);

    showResult('🧭 AZİMUT', [
      ['AZİMUT', `${b1.toFixed(1)}°`, true],
      ['YÖN', bearingToDirection(b1), false],
      ['MESAFE', formatDistance(dist), true],
      ['HEDEF', `${toDMS(lat,'lat')} ${toDMS(lng,'lon')}`, false],
    ]);
  }
}

// ============================================================
// CLEAR TOOLS
// ============================================================
function clearMeasure() {
  measurePoints = [];
  measureMarkers.forEach(m => map.removeLayer(m));
  measureMarkers = [];
  if (measureLine) { map.removeLayer(measureLine); measureLine = null; }
}

function clearAzimuth() {
  if (azimuthMarker) { map.removeLayer(azimuthMarker); azimuthMarker = null; }
  if (azimuthLine) { map.removeLayer(azimuthLine); azimuthLine = null; }
}

// ============================================================
// RESULT PANEL
// ============================================================
function showResult(title, rows) {
  document.getElementById('result-title-text').textContent = title;
  const body = document.getElementById('result-body');
  body.innerHTML = rows.map(([key, val, hl]) =>
    `<div class="result-row">
      <span class="result-key">${key}</span>
      <span class="result-val${hl ? ' highlight' : ''}">${val}</span>
    </div>`
  ).join('');
  document.getElementById('result-panel').classList.add('visible');
}

function hideResult() {
  document.getElementById('result-panel').classList.remove('visible');
}

// ============================================================
// WAYPOINTS
// ============================================================
function openWpModal() { }

function closeWpModal() {
  document.getElementById('wp-modal').classList.add('hidden');
  pendingWpLat = null;
  pendingWpLng = null;
}

function confirmWaypoint() {
  if (pendingWpLat === null) return;
  const name = document.getElementById('wp-name-input').value.trim() || `NOKTA-${wpCounter}`;
  addWaypoint(pendingWpLat, pendingWpLng, name);
  closeWpModal();
}

function addWaypoint(lat, lng, name) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      background:var(--amber,#f59e0b);
      width:12px;height:12px;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:2px solid #050c05;
      box-shadow:0 0 6px #f59e0b;
    "></div>`,
    iconSize: [12, 12],
    iconAnchor: [6, 12]
  });

  const marker = L.marker([lat, lng], { icon }).addTo(map);
  marker.bindPopup(`
    <div style="line-height:1.6">
      <b style="color:#f59e0b">${name}</b><br>
      <span style="color:#86efac;font-size:11px">${toDMS(lat,'lat')}<br>${toDMS(lng,'lon')}</span><br>
      <span style="color:#4ade80;font-size:10px">UTM: ${latLngToUTM(lat,lng).string}</span>
    </div>
  `);

  const wp = { id: wpCounter++, name, lat, lng, marker };
  waypoints.push(wp);
  renderWpList();
}

function deleteWaypoint(id) {
  const idx = waypoints.findIndex(w => w.id === id);
  if (idx === -1) return;
  map.removeLayer(waypoints[idx].marker);
  waypoints.splice(idx, 1);
  renderWpList();
}

function renderWpList() {
  const list = document.getElementById('wp-list');
  if (waypoints.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:8px;text-align:center">Henüz nokta eklenmedi</div>';
    return;
  }
  list.innerHTML = waypoints.map(w => `
    <div class="wp-item" onclick="flyToWp(${w.id})">
      <button class="wp-item-del" onclick="event.stopPropagation();deleteWaypoint(${w.id})">✕</button>
      <div class="wp-item-name">📌 ${w.name}</div>
      <div class="wp-item-coord">${toDMS(w.lat,'lat')}</div>
      <div class="wp-item-coord">${toDMS(w.lng,'lon')}</div>
      ${userLat !== null ? `<div class="wp-item-coord" style="color:var(--amber);margin-top:2px">📏 ${formatDistance(haversine(userLat,userLng,w.lat,w.lng))}</div>` : ''}
    </div>
  `).join('');
}

function flyToWp(id) {
  const wp = waypoints.find(w => w.id === id);
  if (!wp) return;
  map.flyTo([wp.lat, wp.lng], 15);
  wp.marker.openPopup();
}

function toggleWpPanel() {
  const panel = document.getElementById('wp-panel');
  panel.classList.toggle('open');
  renderWpList();
}

// ============================================================
// ELEVATION CALCULATOR
// ============================================================
function openElevModal() {
  document.getElementById('elev-modal').classList.remove('hidden');
  document.getElementById('elev-result').style.display = 'none';
}

function closeElevModal() {
  document.getElementById('elev-modal').classList.add('hidden');
}

function calcElevation() {
  const dist = parseFloat(document.getElementById('elev-dist').value);
  const height = parseFloat(document.getElementById('elev-height').value);

  if (isNaN(dist) || isNaN(height) || dist <= 0) {
    alert('Geçerli değer giriniz.');
    return;
  }

  const angleRad = Math.atan(height / dist);
  const angleDeg = angleRad * 180 / Math.PI;
  const slope = (height / dist * 100).toFixed(1);
  const trueDist = Math.sqrt(dist ** 2 + height ** 2);

  document.getElementById('elev-angle').textContent = angleDeg.toFixed(2) + '°';
  document.getElementById('elev-slope').textContent = (height >= 0 ? '+' : '') + slope + '%';
  document.getElementById('elev-true-dist').textContent = formatDistance(trueDist);
  document.getElementById('elev-result').style.display = 'block';
}

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('[TAC-MAP] SW kayıtlı'))
      .catch(e => console.log('[TAC-MAP] SW hatası:', e));
  });
}

// ============================================================
initMap();
initGPS();

// Show initial instruction
setTimeout(() => showModeIndicator('📡  GPS sinyali bekleniyor...'), 500);
</script>
